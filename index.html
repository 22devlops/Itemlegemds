<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Legends 3D - Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Стили из твоего оригинала */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; overflow: hidden; background: #000; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        .ui-panel { position: absolute; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px; backdrop-filter: blur(10px); pointer-events: auto; z-index: 100; }
        #auth-screen { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; text-align: center; }
        #menu { top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 350px; }
        #game-ui { top: 20px; left: 20px; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; background: #3498db; color: white; transition: 0.3s; }
        .btn:hover { background: #2980b9; transform: scale(1.02); }
        .input-field { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #3498db; background: #111; color: white; }
        .health-bar { width: 200px; height: 20px; background: #444; border-radius: 10px; overflow: hidden; border: 1px solid #fff; margin: 5px 0; }
        .health-fill { height: 100%; transition: 0.3s; }
        .hidden { display: none !important; }
        .fighter-card { background: rgba(46, 204, 113, 0.8); padding: 10px; margin: 5px; border-radius: 8px; display: inline-block; min-width: 150px; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="auth-screen" class="ui-panel">
        <h1>ITEM LEGENDS</h1>
        <input type="text" id="login-in" class="input-field" placeholder="Логин">
        <input type="password" id="pass-in" class="input-field" placeholder="Пароль">
        <button class="btn" onclick="sendAuth('login')">ВОЙТИ</button>
        <button class="btn" style="background:#2ecc71" onclick="sendAuth('register')">РЕГИСТРАЦИЯ</button>
        <p id="auth-msg" style="color:#e74c3c; font-size: 12px;"></p>
    </div>

    <div id="menu" class="ui-panel hidden">
        <h1>ГЛАВНОЕ МЕНЮ</h1>
        <p>Сундуков: <span id="c-count">0</span></p>
        <button class="btn" onclick="startOnline()">🌐 ОНЛАЙН БОЙ</button>
        <button class="btn" onclick="togglePanel('fighters-screen', true)">🎖️ МОИ БОЙЦЫ</button>
        <button class="btn" style="background:#9b59b6" onclick="togglePanel('chest-screen', true)">🎁 СУНДУКИ</button>
    </div>

    <div id="fighters-screen" class="ui-panel hidden" style="top:50%; left:50%; transform:translate(-50%, -50%); max-width: 80%;">
        <h2>ВАШИ БОЙЦЫ</h2>
        <div id="fighters-list"></div>
        <button class="btn" onclick="togglePanel('fighters-screen', false)">НАЗАД</button>
    </div>

    <div id="chest-screen" class="ui-panel hidden" style="top:50%; left:50%; transform:translate(-50%, -50%);">
        <h2>СУНДУКИ: <span id="c-count-2">0</span></h2>
        <button class="btn" id="open-btn" onclick="openChest()">ОТКРЫТЬ (1)</button>
        <p id="chest-res" style="margin: 10px 0; font-weight: bold;"></p>
        <button class="btn" onclick="togglePanel('chest-screen', false)">НАЗАД</button>
    </div>

    <div id="game-ui" class="ui-panel hidden">
        <p>ВЫ: <span id="p-name">Шампунь</span></p>
        <div class="health-bar"><div id="p-hp" class="health-fill" style="background:#2ecc71; width: 100%;"></div></div>
        <p style="margin-top:10px">ВРАГ: <span id="e-name">Ожидание...</span></p>
        <div class="health-bar"><div id="e-hp" class="health-fill" style="background:#e74c3c; width: 100%;"></div></div>
    </div>

    <script>
        // --- ДАННЫЕ ИЗ ТВОЕГО ФАЙЛА ---
        const fighters = [
            { name: "Шампунь", attack: 10, ultimate: 20, health: 100, color: 0x3498db, shape: 'bottle' },
            { name: "Чай", attack: 7, ultimate: 17, health: 85, color: 0xe67e22, shape: 'cup' },
            { name: "Удобрение", attack: 9, ultimate: 19, health: 95, color: 0x8b4513, shape: 'bag' },
            { name: "Сок", attack: 8, ultimate: 18, health: 90, color: 0xf39c12, shape: 'juice' },
            { name: "Ботинки", attack: 6, ultimate: 16, health: 80, color: 0x2c3e50, shape: 'shoe' },
            { name: "Холодильник", attack: 12, ultimate: 25, health: 110, color: 0xecf0f1, shape: 'fridge' },
            { name: "Майка", attack: 6, ultimate: 16, health: 80, color: 0xe91e63, shape: 'shirt' },
            { name: "Сахар", attack: 9, ultimate: 20, health: 90, color: 0xffffff, shape: 'cube' },
            { name: "Сыр", attack: 10, ultimate: 22, health: 95, color: 0xffd700, shape: 'wedge' },
            { name: "Телевизор", attack: 8, ultimate: 25, health: 100, color: 0x34495e, shape: 'tv' },
            { name: "Тёрка", attack: 7, ultimate: 18, health: 85, color: 0x95a5a6, shape: 'grater' },
            { name: "Велосипед", attack: 6, ultimate: 15, health: 80, color: 0x16a085, shape: 'bike' }
        ];

        // --- СЕТЕВОЕ ПОДКЛЮЧЕНИЕ ---
        const socket = io("https://ТВОЙ-АДРЕС.trycloudflare.com");
        let currentUser = "", chestCount = 0, collected = [fighters[0]], selected = fighters[0];

        function sendAuth(type) {
            const l = document.getElementById('login-in').value;
            const p = document.getElementById('pass-in').value;
            if(!l || !p) return;
            currentUser = l;
            socket.emit(type, { login: l, password: p });
        }

        socket.on('authSuccess', (data) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            syncData(data);
            init3D();
        });

        socket.on('authError', (m) => document.getElementById('auth-msg').innerText = m);

        function syncData(data) {
            chestCount = data.chestCount || 0;
            if(data.collectedFighters) {
                collected = fighters.filter(f => data.collectedFighters.includes(f.name));
            }
            updateUINumbers();
        }

        function updateUINumbers() {
            document.getElementById('c-count').innerText = chestCount;
            document.getElementById('c-count-2').innerText = chestCount;
            document.getElementById('open-btn').disabled = chestCount <= 0;
        }

        function togglePanel(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
            if(id === 'fighters-screen' && show) renderFighters();
        }

        function renderFighters() {
            const list = document.getElementById('fighters-list');
            list.innerHTML = "";
            collected.forEach(f => {
                const div = document.createElement('div');
                div.className = "fighter-card";
                div.innerHTML = `<p>${f.name}</p><button class="btn" onclick="selectFighter('${f.name}')">ВЫБРАТЬ</button>`;
                list.appendChild(div);
            });
        }

        function selectFighter(name) {
            selected = fighters.find(f => f.name === name);
            document.getElementById('p-name').innerText = selected.name;
            togglePanel('fighters-screen', false);
        }

        function openChest() {
            if(chestCount <= 0) return;
            chestCount--;
            const newF = fighters[Math.floor(Math.random()*fighters.length)];
            if(!collected.some(f => f.name === newF.name)) collected.push(newF);
            document.getElementById('chest-res').innerText = "Выпал: " + newF.name;
            updateUINumbers();
            socket.emit('saveProgress', { 
                login: currentUser, 
                gameData: { chestCount, collectedFighters: collected.map(f => f.name) } 
            });
        }

        // --- ГЕЙМПЛЕЙ (THREE.JS) ---
        let scene, camera, renderer, playerMesh, enemyMesh, isOnline = false;
        let keys = {};

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.GridHelper(20, 20));
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            animate();
        }

        function startOnline() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            playerMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: selected.color}));
            scene.add(playerMesh);

            enemyMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0xff0000}));
            enemyMesh.position.z = -5;
            scene.add(enemyMesh);

            isOnline = true;
            socket.emit('findMatch', { name: currentUser, hero: selected.name });
        }

        socket.on('oppUpdate', (pos) => { if(enemyMesh) enemyMesh.position.copy(pos); });

        function animate() {
            requestAnimationFrame(animate);
            if(isOnline) {
                if(keys['w']) playerMesh.position.z -= 0.1;
                if(keys['s']) playerMesh.position.z += 0.1;
                if(keys['a']) playerMesh.position.x -= 0.1;
                if(keys['d']) playerMesh.position.x += 0.1;
                socket.emit('move', playerMesh.position);
            }
            renderer.render(scene, camera);
        }

        function attack() {
            if(!isOnline) return;
            playerMesh.position.y += 0.5;
            setTimeout(() => playerMesh.position.y = 0, 150);
            socket.emit('attack', selected.attack);
        }

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if(e.key.toLowerCase() === 'e') attack();
        });
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
    </script>
</body>
</html>
