<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Legends 3D - Full Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; overflow: hidden; background: #000; color: white; }
        #canvas-container { width: 100vw; height: 100vh; position: relative; }
        .ui-panel { position: absolute; background: rgba(0, 0, 0, 0.85); padding: 25px; border-radius: 15px; border: 2px solid #3498db; backdrop-filter: blur(10px); pointer-events: auto; z-index: 100; }
        #auth-screen { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; text-align: center; }
        #menu { top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 350px; }
        #game-ui { top: 20px; left: 20px; }
        .btn { width: 100%; padding: 12px; margin: 8px 0; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; background: #3498db; color: white; transition: 0.3s; }
        .btn:hover { background: #2980b9; transform: scale(1.02); }
        .input-field { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: 1px solid #3498db; background: #111; color: white; }
        .health-bar { width: 200px; height: 20px; background: #444; border-radius: 10px; overflow: hidden; border: 1px solid #fff; margin: 5px 0; }
        .health-fill { height: 100%; transition: 0.3s; }
        .hidden { display: none !important; }
        #chest-result { font-size: 20px; color: #f1c40f; margin: 15px 0; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="auth-screen" class="ui-panel">
        <h2>ITEM LEGENDS</h2>
        <input type="text" id="log-input" class="input-field" placeholder="Логин">
        <input type="password" id="pas-input" class="input-field" placeholder="Пароль">
        <button class="btn" onclick="sendAuth('login')">ВОЙТИ</button>
        <button class="btn" style="background:#2ecc71" onclick="sendAuth('register')">РЕГИСТРАЦИЯ</button>
        <p id="auth-msg" style="color:#e74c3c; font-size: 12px; margin-top:10px"></p>
    </div>

    <div id="menu" class="ui-panel hidden">
        <h1>МЕНЮ</h1>
        <p>Бойцов: <span id="f-count">1</span> | Сундуков: <span id="c-count">0</span></p>
        <button class="btn" onclick="startBattle()">🌐 ОНЛАЙН БОЙ</button>
        <button class="btn" style="background:#9b59b6" onclick="togglePanel('chest-screen', true)">🎁 СУНДУКИ</button>
        <button class="btn" style="background:#8e44ad" onclick="togglePanel('fighters-screen', true)">🎖️ МОИ БОЙЦЫ</button>
    </div>

    <div id="chest-screen" class="ui-panel hidden" style="top:50%; left:50%; transform:translate(-50%,-50%)">
        <h2>СУНДУКИ: <span id="c-count-2">0</span></h2>
        <div id="chest-result"></div>
        <button class="btn" id="open-btn" onclick="openChest()">ОТКРЫТЬ (1)</button>
        <button class="btn" onclick="togglePanel('chest-screen', false)">НАЗАД</button>
    </div>

    <div id="game-ui" class="ui-panel hidden">
        <p>ВЫ: <span id="p-name">Шампунь</span></p>
        <div class="health-bar"><div id="p-hp" class="health-fill" style="background:#2ecc71; width:100%"></div></div>
        <p style="margin-top:10px">ВРАГ: <span id="e-name">Ожидание...</span></p>
        <div class="health-bar"><div id="e-hp" class="health-fill" style="background:#e74c3c; width:100%"></div></div>
        <p style="font-size:12px; margin-top:10px">WASD - Ходить | E - Атака</p>
    </div>

    <script>
        // --- ПОДКЛЮЧЕНИЕ К СЕРВЕРУ ---
        // ЗАМЕНИ НА СВОЮ ССЫЛКУ ИЗ CLOUDFLARE
        const socket = io("https://yen-acquire-summer-astrology.trycloudflare.com ");

        const fighters = [
            { name: "Шампунь", attack: 10, health: 100, color: 0x3498db },
            { name: "Чай", attack: 7, health: 85, color: 0xe67e22 },
            { name: "Удобрение", attack: 9, health: 95, color: 0x8b4513 },
            { name: "Сок", attack: 8, health: 90, color: 0xf39c12 },
            { name: "Ботинки", attack: 6, health: 80, color: 0x2c3e50 },
            { name: "Холодильник", attack: 15, health: 120, color: 0xecf0f1 },
            { name: "Майка", attack: 6, health: 80, color: 0xe91e63 },
            { name: "Сахар", attack: 9, health: 90, color: 0xffffff },
            { name: "Сыр", attack: 10, health: 95, color: 0xffd700 },
            { name: "Телевизор", attack: 8, health: 100, color: 0x34495e },
            { name: "Тёрка", attack: 7, health: 85, color: 0x95a5a6 },
            { name: "Велосипед", attack: 6, health: 80, color: 0x16a085 }
        ];

        let currentUser = "", chestCount = 0, myFighters = ["Шампунь"], selectedFighter = fighters[0];
        let scene, camera, renderer, playerMesh, enemyMesh;
        let pHP = 100, eHP = 100, isGaming = false, keys = {};

        // --- ЛОГИКА АВТОРИЗАЦИИ ---
        function sendAuth(type) {
            const l = document.getElementById('log-input').value;
            const p = document.getElementById('pas-input').value;
            if(!l || !p) return;
            currentUser = l;
            socket.emit(type, { login: l, password: p });
        }

        socket.on('authSuccess', (data) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            chestCount = data.chestCount || 0;
            myFighters = data.collectedFighters || ["Шампунь"];
            updateUI();
            init3D();
        });

        socket.on('authError', (m) => document.getElementById('auth-msg').innerText = m);

        function updateUI() {
            document.getElementById('c-count').innerText = chestCount;
            document.getElementById('c-count-2').innerText = chestCount;
            document.getElementById('f-count').innerText = myFighters.length;
            document.getElementById('open-btn').disabled = chestCount <= 0;
        }

        function togglePanel(id, show) {
            document.getElementById(id).classList.toggle('hidden', !show);
        }

        function openChest() {
            if(chestCount <= 0) return;
            chestCount--;
            const won = fighters[Math.floor(Math.random() * fighters.length)].name;
            if(!myFighters.includes(won)) myFighters.push(won);
            document.getElementById('chest-result').innerText = "Выпал: " + won;
            updateUI();
            socket.emit('saveProgress', { login: currentUser, gameData: { chestCount, collectedFighters: myFighters } });
        }

        // --- THREE.JS ГЕЙМПЛЕЙ ---
        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            scene.add(new THREE.GridHelper(20, 20));
            scene.add(new THREE.AmbientLight(0xffffff, 1));
            animate();
        }

        function startBattle() {
            document.getElementById('menu').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            
            playerMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: selectedFighter.color}));
            scene.add(playerMesh);

            enemyMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0xff0000}));
            enemyMesh.position.z = -5;
            scene.add(enemyMesh);

            isGaming = true;
            socket.emit('findMatch', { name: currentUser, hero: selectedFighter.name });
        }

        socket.on('matchFound', (d) => {
            document.getElementById('e-name').innerText = d.opponent.name;
        });

        socket.on('oppUpdate', (pos) => { if(enemyMesh) enemyMesh.position.copy(pos); });

        socket.on('takeDamage', (dmg) => {
            pHP -= dmg;
            document.getElementById('p-hp').style.width = pHP + "%";
            if(pHP <= 0) { alert("Поражение!"); location.reload(); }
        });

        function animate() {
            requestAnimationFrame(animate);
            if(isGaming) {
                if(keys['w']) playerMesh.position.z -= 0.1;
                if(keys['s']) playerMesh.position.z += 0.1;
                if(keys['a']) playerMesh.position.x -= 0.1;
                if(keys['d']) playerMesh.position.x += 0.1;
                socket.emit('move', playerMesh.position);
            }
            renderer.render(scene, camera);
        }

        function attack() {
            if(!isGaming) return;
            // Анимация прыжка
            playerMesh.position.y += 0.5;
            setTimeout(() => playerMesh.position.y = 0, 150);
            socket.emit('attack', selectedFighter.attack);
        }

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if(e.key.toLowerCase() === 'e') attack();
        });
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
    </script>
</body>
</html>
