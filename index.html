<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Legends 3D - Online Fix</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Arial', sans-serif; overflow: hidden; background: #000; color: white; }
        #canvas-container { width: 100vw; height: 100vh; }
        .ui-panel { position: absolute; background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px; z-index: 10; pointer-events: auto; }
        #auth-screen { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; text-align: center; }
        #menu { top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .btn { padding: 12px 25px; margin: 8px; border: none; border-radius: 8px; cursor: pointer; background: #3498db; color: white; width: 100%; }
        .hidden { display: none !important; }
        .input-field { width: 100%; padding: 10px; margin: 5px 0; background: #222; border: 1px solid #3498db; color: white; }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="auth-screen" class="ui-panel">
        <h2>ITEM LEGENDS</h2>
        <input type="text" id="log" class="input-field" placeholder="Логин">
        <input type="password" id="pas" class="input-field" placeholder="Пароль">
        <button class="btn" onclick="auth('login')">ВОЙТИ</button>
        <button class="btn" style="background:#2ecc71" onclick="auth('register')">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="menu" class="ui-panel hidden">
        <h1>МЕНЮ</h1>
        <button class="btn" onclick="startBattle()">🌐 ОНЛАЙН БОЙ</button>
    </div>

    <script>
        // ТВОЯ ССЫЛКА ИЗ ТЕРМИНАЛА (Cloudflare/Ngrok)
        const socket = io("https://yen-acquire-summer-astrology.trycloudflare.com ");

        let scene, camera, renderer, playerMesh, enemyMesh;
        let gameState = 'auth';
        let keys = {};
        let playerHP = 100, enemyHP = 100;

        function auth(type) {
            const login = document.getElementById('log').value;
            const pass = document.getElementById('pas').value;
            socket.emit(type, { login, password: pass });
        }

        socket.on('authSuccess', () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('menu').classList.remove('hidden');
            init3D();
        });

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);
            renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);
            
            scene.add(new THREE.GridHelper(20, 20));
            scene.add(new THREE.AmbientLight(0xffffff, 1));

            // Твой боец
            playerMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0x3498db}));
            scene.add(playerMesh);

            // Враг
            enemyMesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), new THREE.MeshStandardMaterial({color: 0xe74c3c}));
            enemyMesh.position.z = -5;
            scene.add(enemyMesh);

            animate();
        }

        function startBattle() {
            document.getElementById('menu').classList.add('hidden');
            gameState = 'battle';
            socket.emit('findMatch', { name: "Игрок" });
        }

        // Логика атаки
        function doAttack() {
            if(gameState !== 'battle') return;
            
            // Анимация прыжка
            playerMesh.position.y += 0.5;
            setTimeout(() => playerMesh.position.y = 0, 200);

            // Шлем урон на малинку
            socket.emit('attack', 10);
        }

        // Получение урона
        socket.on('takeDamage', (dmg) => {
            playerHP -= dmg;
            console.log("Твоё HP: " + playerHP);
            if(playerHP <= 0) alert("Поражение!");
        });

        // Движение врага
        socket.on('oppUpdate', (pos) => {
            enemyMesh.position.set(pos.x, pos.y, pos.z);
        });

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
            if(e.key.toLowerCase() === 'e') doAttack();
        });
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function animate() {
            requestAnimationFrame(animate);
            if(gameState === 'battle') {
                if(keys['w']) playerMesh.position.z -= 0.1;
                if(keys['s']) playerMesh.position.z += 0.1;
                if(keys['a']) playerMesh.position.x -= 0.1;
                if(keys['d']) playerMesh.position.x += 0.1;
                
                // Шлем позицию на малинку
                socket.emit('move', playerMesh.position);
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
